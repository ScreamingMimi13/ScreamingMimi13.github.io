<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Broken Chain — A Movie</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%; background:#07070d; overflow:hidden;
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  #stage {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    background:#000; box-shadow:0 0 60px rgba(0,0,0,.9);
  }
  canvas { display:block; width:100%; height:100%; cursor:pointer; }
  #dlg {
    position:absolute; left:3%; right:3%; bottom:2.5%;
    background:rgba(12,10,22,.92);
    border:2px solid #c9a227; border-radius:10px;
    padding:1.6% 2.2% 1.2% 2.2%;
    min-height:19%;
    pointer-events:none;
    display:none;
  }
  #dlg::before {
    content:''; position:absolute; left:8px; right:8px; top:4px; height:3px;
    background:repeating-linear-gradient(90deg,#c9a227 0 10px,transparent 10px 16px);
    opacity:.5; border-radius:2px;
  }
  #speaker {
    font-weight:bold; letter-spacing:2px; font-size:15px;
    color:#f4d35e; margin-bottom:5px; text-transform:uppercase;
  }
  #text { color:#f2ecdd; font-size:19px; line-height:1.45; min-height:2.9em; }
  #hint {
    position:absolute; right:14px; bottom:8px; color:#c9a227;
    font-size:12px; letter-spacing:1px; opacity:.85;
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.95} }
  #progress {
    position:absolute; top:10px; right:14px; color:#8a7f66; font-size:12px;
    letter-spacing:2px; pointer-events:none;
  }
  #voiceBtn {
    position:absolute; top:8px; left:12px; background:rgba(12,10,22,.7);
    color:#c9a227; border:1px solid #c9a227; border-radius:14px;
    font-family:Georgia,serif; font-size:11px; letter-spacing:1px;
    padding:4px 12px; cursor:pointer;
  }
  #voiceBtn:hover { background:rgba(201,162,39,.25); }
  #replay {
    position:absolute; left:50%; top:72%; transform:translateX(-50%);
    display:none; background:#c9a227; color:#1b1408; border:none;
    font-family:Georgia,serif; font-size:20px; font-weight:bold;
    padding:12px 34px; border-radius:30px; cursor:pointer; letter-spacing:1px;
    box-shadow:0 4px 18px rgba(201,162,39,.45);
  }
  #replay:hover { background:#f4d35e; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="dlg">
    <div id="speaker"></div>
    <div id="text"></div>
    <div id="hint">click &#9654;</div>
  </div>
  <div id="progress"></div>
  <button id="voiceBtn">VOICE ON</button>
  <button id="replay">Play Again</button>
</div>
<script>
(() => {
'use strict';

const W = 960, H = 540;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
const dlg = document.getElementById('dlg');
const speakerEl = document.getElementById('speaker');
const textEl = document.getElementById('text');
const hintEl = document.getElementById('hint');
const progEl = document.getElementById('progress');
const replayBtn = document.getElementById('replay');

function fit() {
  const vw = window.innerWidth, vh = window.innerHeight;
  let w = vw, h = vw * (H / W);
  if (h > vh) { h = vh; w = vh * (W / H); }
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
}
window.addEventListener('resize', fit);
fit();

// ---------- utilities ----------
const rand = (a, b) => a + Math.random() * (b - a);
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------- speaker colors ----------
const SPEAKER_COLORS = {
  'DELPHI': '#c7a6ff', 'MOM': '#ffb3c1', 'DAD': '#9ad1ff',
  'MEME': '#7dffb0', 'MEDUSA': '#7dffb0', 'SEO': '#7fd4ff',
  'HERMES': '#ffe28a', 'ARES': '#ff6b52', 'THE GANG': '#ff9a76',
  'STHENO': '#a8ffcf', 'THE NOTE': '#f4d35e'
};

// ---------- voices ----------
// Each character is cast a real installed voice: g picks the female or male
// pool, slot picks WHICH voice in that pool, and pitch/rate fine-tune on top.
const VOICE = {
  'DELPHI':   { g: 'f', slot: 0, pitch: 1.5, rate: 1.15 },
  'MOM':      { g: 'f', slot: 1, pitch: 1.0, rate: 1.0 },
  'MEME':     { g: 'f', slot: 2, pitch: 1.8, rate: 1.2 },
  'MEDUSA':   { g: 'f', slot: 2, pitch: 1.8, rate: 1.2 },
  'STHENO':   { g: 'f', slot: 3, pitch: 1.2, rate: 0.9 },
  'THE NOTE': { g: 'f', slot: 2, pitch: 1.8, rate: 1.0 },
  'DAD':      { g: 'm', slot: 0, pitch: 0.8, rate: 0.95 },
  'SEO':      { g: 'm', slot: 1, pitch: 1.5, rate: 1.05 },
  'HERMES':   { g: 'm', slot: 2, pitch: 1.3, rate: 1.5 },
  'ARES':     { g: 'm', slot: 3, pitch: 0.3, rate: 0.85 },
  'THE GANG': { g: 'm', slot: 1, pitch: 1.4, rate: 1.3 }
};
// Which actor's mouth moves for each speaker
const MOUTH_OF = {
  'DELPHI': ['delphi'], 'MOM': ['mom', 'bed'], 'DAD': ['dad'],
  'MEDUSA': ['medusa'], 'MEME': ['medusa'], 'SEO': ['seo'], 'HERMES': ['hermes'],
  'ARES': ['ares'], 'THE GANG': ['goon1', 'goon2'], 'STHENO': ['stheno']
};
let voiceOn = true;
let femVoices = [], mascVoices = [];
function pickVoices() {
  const vs = speechSynthesis.getVoices().filter(v => v.lang && v.lang.indexOf('en') === 0);
  const isF = v => /zira|aria|jenny|michelle|ana|emma|hazel|libby|sonia|susan|linda|heather|eva|catherine|samantha|victoria|karen|moira|tessa|fiona|natasha|clara|salli|joanna|kimberly|ivy|female|woman|girl/i.test(v.name);
  const isM = v => !isF(v) && /david|mark|guy|george|james|richard|ryan|davis|tony|jason|daniel|alex|fred|eric|christopher|liam|william|thomas|matthew|joey|justin|male|man\b|boy/i.test(v.name);
  femVoices = vs.filter(isF);
  mascVoices = vs.filter(isM);
  // Voices we couldn't tell apart by name: deal them out so pools still differ
  const rest = vs.filter(v => femVoices.indexOf(v) < 0 && mascVoices.indexOf(v) < 0);
  rest.forEach((v, i) => (i % 2 === 0 ? femVoices : mascVoices).push(v));
  // Modern neural voices (Edge's "Natural" ones) sound human - use them first
  const natScore = v => (/natural|online|neural/i.test(v.name) ? 1 : 0);
  femVoices.sort((a, b) => natScore(b) - natScore(a));
  mascVoices.sort((a, b) => natScore(b) - natScore(a));
  if (!femVoices.length) femVoices = mascVoices.slice().reverse();
  if (!mascVoices.length) mascVoices = femVoices.slice().reverse();
}
if (window.speechSynthesis) {
  pickVoices();
  speechSynthesis.onvoiceschanged = pickVoices;
}
// What the voice actually says (screen text stays as written)
function spokenText(s) {
  return s
    .replace(/MeMe/g, 'Mee Mee')
    .replace(/\bShhh+/gi, 'Shush')
    .replace(/\bH-(?=\s)/g, 'ha')
    .replace(/DELPHIIIII/g, 'Delpheeeee')
    .replace(/iMortal/g, 'eye-mortal');
}
// Read the drama in a sentence and bend pitch/speed to match
function emotion(text, v) {
  let pitch = v.pitch, rate = v.rate;
  const excl = (text.match(/!/g) || []).length;
  const caps = (text.match(/\b[A-Z]{3,}\b/g) || []).length;
  if (excl >= 2 || caps >= 2) { pitch += 0.5; rate += 0.25; }        // shouting / thrilled
  else if (excl === 1 || caps === 1) { pitch += 0.25; rate += 0.12; } // excited
  if (/\.\.\./.test(text) && excl === 0) { pitch -= 0.25; rate -= 0.3; } // sad, hesitant
  if (/\?\s*$/.test(text)) pitch += 0.2;                             // questions rise
  return {
    pitch: Math.max(0.1, Math.min(2, pitch)),
    rate: Math.max(0.6, Math.min(2, rate))
  };
}
let pendingGroup = 0;
function speak(line) {
  if (!voiceOn || !window.speechSynthesis || !line.s) return;
  try {
    // voices load late on some browsers - retry the casting if pools are empty
    if (!femVoices.length && !mascVoices.length) pickVoices();
    speechSynthesis.cancel();
    const v = VOICE[line.s] || { pitch: 1, rate: 1, slot: 0 };
    const pool = v.g === 'f' ? femVoices : mascVoices;
    const voice = pool.length ? pool[(v.slot || 0) % pool.length] : null;
    // speak sentence by sentence so the emotion can change mid-line
    const parts = spokenText(line.t).match(/[^.!?]+[.!?]*/g) || [line.t];
    const group = ++pendingGroup;
    // Chrome bug: speak() right after cancel() can ignore the chosen voice
    // and fall back to the default one - wait a beat before speaking.
    setTimeout(() => {
      if (group !== pendingGroup) return;
      for (let i = 0; i < parts.length; i++) {
        const txt = parts[i].trim();
        if (!txt) continue;
        const u = new SpeechSynthesisUtterance(txt);
        const e = emotion(parts[i], v);
        u.pitch = e.pitch; u.rate = e.rate;
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      }
    }, 60);
  } catch (e) { /* speech is a bonus; never break the movie */ }
}

// ---------- character drawing ----------
// All characters are drawn anchored at their feet (0,0), facing right.
function person(t, o) {
  const h = o.h || 120;
  const bob = o.walk
    ? -Math.abs(Math.sin(t * 9 + (o.seed || 0))) * 3
    : Math.sin(t * 2 + (o.seed || 0)) * 2.2;
  const headR = h * 0.165;
  const hemY = -h * 0.16;
  const shoulderY = -h * 0.62 + bob;
  const hipW = h * 0.21, shW = h * 0.13;

  // feet / sandals (scissor while walking)
  const walkP = o.walk ? Math.sin(t * 9 + (o.seed || 0)) : 0;
  const fOff = walkP * 9, bOff = -walkP * 9;
  const fLift = o.walk ? Math.max(0, walkP) * 5 : 0;
  const bLift = o.walk ? Math.max(0, -walkP) * 5 : 0;
  ctx.fillStyle = o.skin;
  ctx.beginPath(); ctx.ellipse(-hipW * 0.45 + bOff, -3 - bLift, 8, 4, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hipW * 0.45 + fOff, -3 - fLift, 8, 4, 0, 0, 7); ctx.fill();
  if (o.wingFeet) {
    ctx.fillStyle = '#fff';
    for (const s of [-1, 1]) {
      const flap = Math.sin(t * 10) * 3;
      ctx.beginPath();
      ctx.moveTo(s * hipW * 0.45, -5);
      ctx.quadraticCurveTo(s * (hipW * 0.45 + 16), -14 - flap, s * (hipW * 0.45 + 20), -4);
      ctx.quadraticCurveTo(s * (hipW * 0.45 + 10), -2, s * hipW * 0.45, -5);
      ctx.fill();
    }
  }
  // legs
  ctx.strokeStyle = o.skin; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-hipW * 0.42 + bOff, -4 - bLift); ctx.lineTo(-hipW * 0.35, hemY + bob * 0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hipW * 0.42 + fOff, -4 - fLift); ctx.lineTo(hipW * 0.35, hemY + bob * 0.4); ctx.stroke();
  // chiton (dress)
  ctx.fillStyle = o.dress;
  ctx.beginPath();
  ctx.moveTo(-shW, shoulderY);
  ctx.lineTo(shW, shoulderY);
  ctx.lineTo(hipW, hemY + bob * 0.4);
  ctx.lineTo(-hipW, hemY + bob * 0.4);
  ctx.closePath(); ctx.fill();
  // belt
  ctx.fillStyle = o.belt || '#c9a227';
  ctx.fillRect(-shW * 1.15, shoulderY + (hemY - shoulderY) * 0.52, shW * 2.3, 4);
  // arms
  ctx.strokeStyle = o.skin; ctx.lineWidth = 5;
  const armSwing = o.walk
    ? Math.sin(t * 9 + (o.seed || 0)) * 0.45
    : Math.sin(t * 2 + (o.seed || 0)) * 0.08;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(s * shW * 0.9, shoulderY + 5);
    ctx.lineTo(s * (shW * 0.9 + h * 0.1), shoulderY + h * 0.24 + s * armSwing * 20);
    ctx.stroke();
  }
  // head
  const headY = shoulderY - headR - 3;
  ctx.fillStyle = o.skin;
  ctx.beginPath(); ctx.arc(0, headY, headR, 0, 7); ctx.fill();
  // hair
  if (o.snakes) {
    ctx.strokeStyle = o.hair; ctx.lineWidth = 4; ctx.lineCap = 'round';
    for (let i = 0; i < 7; i++) {
      const a = -Math.PI * 0.95 + (i / 6) * Math.PI * 0.9;
      const bx = Math.cos(a) * headR * 0.95, by = headY + Math.sin(a) * headR * 0.95;
      const wig = Math.sin(t * 4 + i * 1.7) * 6;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(bx * 1.9 + wig, by - headR * 0.9, bx * 2.1 + wig * 1.4, by - headR * 1.5 + Math.cos(t * 3 + i) * 3);
      ctx.stroke();
      ctx.fillStyle = '#3e8e5a';
      ctx.beginPath();
      ctx.arc(bx * 2.1 + wig * 1.4, by - headR * 1.5 + Math.cos(t * 3 + i) * 3, 2.6, 0, 7);
      ctx.fill();
    }
  } else if (o.hair) {
    ctx.fillStyle = o.hair;
    ctx.beginPath();
    ctx.arc(0, headY - headR * 0.18, headR * 1.04, Math.PI * 0.95, Math.PI * 2.05);
    ctx.fill();
    if (o.longHair) {
      ctx.beginPath();
      ctx.moveTo(-headR, headY);
      ctx.quadraticCurveTo(-headR * 1.35, headY + headR * 1.6, -headR * 0.7, shoulderY + 12);
      ctx.lineTo(-headR * 0.35, shoulderY);
      ctx.quadraticCurveTo(-headR * 0.9, headY + headR * 0.6, -headR * 0.8, headY);
      ctx.fill();
    }
  }
  if (o.laurel) {
    ctx.fillStyle = '#6fbf73';
    for (let i = -3; i <= 3; i++) {
      const a = -Math.PI / 2 + i * 0.28;
      const lx = Math.cos(a) * headR * 1.02, ly = headY + Math.sin(a) * headR * 1.02;
      ctx.save(); ctx.translate(lx, ly); ctx.rotate(a + Math.PI / 2);
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 2.2, 0, 0, 7); ctx.fill();
      ctx.restore();
    }
  }
  if (o.warHelm) {
    // bronze war helmet with a red plume
    ctx.fillStyle = '#b08d3e';
    ctx.beginPath(); ctx.arc(0, headY - headR * 0.15, headR * 1.06, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillRect(-headR * 1.06, headY - headR * 0.2, headR * 0.32, headR * 0.75);
    ctx.fillStyle = '#c62828';
    ctx.beginPath();
    ctx.moveTo(-headR * 0.9, headY - headR * 0.7);
    ctx.quadraticCurveTo(0, headY - headR * 2.2 + Math.sin(t * 3) * 2, headR * 0.9, headY - headR * 0.7);
    ctx.quadraticCurveTo(0, headY - headR * 1.5, -headR * 0.9, headY - headR * 0.7);
    ctx.fill();
  }
  if (o.wingHelm) {
    ctx.fillStyle = '#f4d35e';
    ctx.beginPath(); ctx.arc(0, headY - headR * 0.25, headR * 1.02, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    for (const s of [-1, 1]) {
      const flap = Math.sin(t * 8) * 4;
      ctx.beginPath();
      ctx.moveTo(s * headR * 0.9, headY - headR * 0.4);
      ctx.quadraticCurveTo(s * headR * 2, headY - headR * 1.4 - flap, s * headR * 2.3, headY - headR * 0.3);
      ctx.quadraticCurveTo(s * headR * 1.4, headY - headR * 0.2, s * headR * 0.9, headY - headR * 0.4);
      ctx.fill();
    }
  }
  // face (faces right)
  const ex = headR * 0.42, ey = headY - headR * 0.1;
  if (o.glowEyes) {
    ctx.fillStyle = '#ffe37a';
    ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(ex, ey, 3.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - headR * 0.62, ey, 3.4, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#2a2118';
    ctx.beginPath(); ctx.arc(ex, ey, 2.4, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - headR * 0.62, ey, 2.4, 0, 7); ctx.fill();
  }
  const my = headY + headR * 0.42;
  if (o.talking) {
    // mouth opens and closes while speaking
    ctx.fillStyle = '#2a2118';
    const open = 1.2 + Math.abs(Math.sin(t * 13 + (o.seed || 0))) * 3.2;
    ctx.beginPath(); ctx.ellipse(ex - headR * 0.3, my, headR * 0.2, open, 0, 0, 7); ctx.fill();
  } else {
    ctx.strokeStyle = '#2a2118'; ctx.lineWidth = 1.8;
    ctx.beginPath();
    if (o.sad) ctx.arc(ex - headR * 0.3, my + 4, headR * 0.28, Math.PI * 1.15, Math.PI * 1.85);
    else ctx.arc(ex - headR * 0.3, my, headR * 0.3, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();
  }
  // held sword
  if (o.sword) {
    ctx.save();
    ctx.translate(shW * 0.9 + h * 0.1, shoulderY + h * 0.24);
    ctx.rotate(-0.5);
    ctx.fillStyle = '#cfd8dc'; ctx.fillRect(-2, -34, 4, 34);
    ctx.fillStyle = '#c9a227'; ctx.fillRect(-7, -2, 14, 4);
    ctx.restore();
  }
}

const CHAR = {
  delphi: o => person(o.t, { h: 112, skin: '#e8b98d', dress: '#b39ddb', hair: '#5d4030', longHair: true, laurel: true, seed: 1, ...o }),
  mom:    o => person(o.t, { h: 150, skin: '#e8b98d', dress: '#f48fb1', hair: '#3e2c20', longHair: true, seed: 2, ...o }),
  dad:    o => person(o.t, { h: 156, skin: '#d9a06f', dress: '#90caf9', hair: '#2c2118', seed: 3, ...o }),
  medusa: o => person(o.t, { h: 126, skin: '#a5d6a7', dress: '#69f0ae', belt: '#fff', hair: '#2e7d4f', snakes: true, seed: 4, ...o }),
  seo:    o => person(o.t, { h: 118, skin: '#e0ac7e', dress: '#4fc3f7', hair: '#1f1a14', seed: 5, ...o }),
  hermes: o => person(o.t, { h: 190, skin: '#f0c27a', dress: '#fff8e1', hair: '#c9a227', wingHelm: true, wingFeet: true, seed: 6, ...o }),
  ares:   o => person(o.t, { h: 152, skin: '#c98d5f', dress: '#c62828', belt: '#b08d3e', hair: '#33251a', warHelm: true, seed: 7, ...o }),
  goon1:  o => person(o.t, { h: 128, skin: '#f0c9a0', dress: '#8d6e63', hair: '#111', seed: 8, ...o }),
  goon2:  o => person(o.t, { h: 122, skin: '#d9a06f', dress: '#607d8b', hair: '#4a3423', seed: 11, ...o }),
  stheno: o => person(o.t, { h: 128, skin: '#a5d6a7', dress: '#4dd0e1', snakes: true, hair: '#2e7d4f', seed: 9, ...o }),
  euryale:o => person(o.t, { h: 124, skin: '#b9e4b0', dress: '#ce93d8', snakes: true, hair: '#2e7d4f', seed: 10, ...o })
};

function medusaDown(t) {
  // Medusa lying on the sand, snakes limp
  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#69f0ae';
  ctx.beginPath(); ctx.ellipse(30, -12, 46, 13, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#a5d6a7';
  ctx.beginPath(); ctx.arc(-28, -16, 17, 0, 7); ctx.fill();
  ctx.strokeStyle = '#2e7d4f'; ctx.lineWidth = 3.6; ctx.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(-38 - i * 1.5, -22 + i * 2);
    ctx.quadraticCurveTo(-58 - i * 5, -20 + i * 3, -66 - i * 6, -6 + i * 1.5);
    ctx.stroke();
  }
  ctx.strokeStyle = '#2a2118'; ctx.lineWidth = 1.6;
  // closed eyes
  ctx.beginPath(); ctx.moveTo(-34, -18); ctx.lineTo(-28, -18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-24, -18); ctx.lineTo(-18, -18); ctx.stroke();
  ctx.restore();
}

function momInBed(t, talking) {
  // hospital bed, anchored at floor
  ctx.fillStyle = '#8d6e63';
  ctx.fillRect(-90, -46, 8, 46); ctx.fillRect(82, -46, 8, 46);
  ctx.fillStyle = '#eceff1'; rr(-90, -60, 180, 22, 8); ctx.fill();
  ctx.fillStyle = '#b3d4f5'; rr(-86, -56, 150, 14, 6); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(66, -62, 18, 9, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#e8b98d';
  ctx.beginPath(); ctx.arc(62, -70, 11, 0, 7); ctx.fill();
  ctx.fillStyle = '#3e2c20';
  ctx.beginPath(); ctx.arc(62, -74, 11, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2a2118';
  ctx.beginPath(); ctx.arc(58, -69, 1.6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(64, -69, 1.6, 0, 7); ctx.fill();
  if (talking) {
    ctx.fillStyle = '#2a2118';
    ctx.beginPath(); ctx.ellipse(61, -65, 2.2, 1 + Math.abs(Math.sin(t * 13)) * 2.4, 0, 0, 7); ctx.fill();
  } else {
    ctx.strokeStyle = '#2a2118'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(61, -65, 3.2, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
  }
}

function palm(x, y, s, t) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  ctx.strokeStyle = '#8d6e4c'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(14, -70, 4, -130); ctx.stroke();
  ctx.strokeStyle = '#4c9e57'; ctx.lineWidth = 7;
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI + (i / 5) * Math.PI;
    const sway = Math.sin(t * 1.4 + i) * 4;
    ctx.beginPath();
    ctx.moveTo(4, -130);
    ctx.quadraticCurveTo(4 + Math.cos(a) * 40, -150 + Math.sin(a) * 18 + sway, 4 + Math.cos(a) * 62, -122 + Math.sin(a) * 30 + sway);
    ctx.stroke();
  }
  ctx.restore();
}

// ---------- particles ----------
let sparkles = [];
function burstSparkles(x, y, n, col) {
  for (let i = 0; i < n; i++) {
    sparkles.push({
      x: x + rand(-40, 40), y: y + rand(-60, 20),
      vx: rand(-30, 30), vy: rand(-70, -20),
      life: rand(0.7, 1.6), age: 0, col: col || '#ffe37a', r: rand(1.5, 3.5)
    });
  }
}
function drawSparkles(dt) {
  sparkles = sparkles.filter(p => (p.age += dt) < p.life);
  for (const p of sparkles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    const a = 1 - p.age / p.life;
    ctx.fillStyle = p.col;
    ctx.globalAlpha = a;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.age * 4);
    ctx.fillRect(-p.r, -0.8, p.r * 2, 1.6);
    ctx.fillRect(-0.8, -p.r, 1.6, p.r * 2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ---------- scene state ----------
let sceneIdx = 0, lineIdx = -1;
let cast = {};
let flags = {};
let sceneT = 0;
let fade = 1, fadeDir = -1, pendingScene = -1;
let typing = false, typeProgress = 0, fullText = '';
let finished = false;

function deepCopyCast(c) {
  const out = {};
  for (const k in c) out[k] = { ...c[k] };
  return out;
}

function startScene(i) {
  sceneIdx = i;
  lineIdx = -1;
  sceneT = 0;
  flags = {};
  sparkles = [];
  cast = deepCopyCast(SCENES[i].cast);
  progEl.textContent = 'SCENE ' + (i + 1) + ' / ' + SCENES.length;
  if (SCENES[i].lines.length === 0) { dlg.style.display = 'none'; typing = false; }
  else nextLine();
}

function nextLine() {
  const scene = SCENES[sceneIdx];
  lineIdx++;
  if (lineIdx >= scene.lines.length) {
    if (sceneIdx + 1 < SCENES.length) {
      pendingScene = sceneIdx + 1;
      fadeDir = 1;
    } else {
      finished = true;
      dlg.style.display = 'none';
      replayBtn.style.display = 'block';
    }
    return;
  }
  const line = scene.lines[lineIdx];
  if (line.set) {
    for (const k in line.set) {
      const patch = line.set[k];
      if (patch.unhide) { cast[k] = { ...patch }; delete cast[k].unhide; }
      else if (cast[k]) Object.assign(cast[k], patch);
      else cast[k] = { ...patch };
    }
  }
  if (line.flag) Object.assign(flags, line.flag);
  if (line.move) for (const k in line.move) if (cast[k]) cast[k].tx = line.move[k];
  if (line.fx === 'crash') {
    flags.crashed = true;
    flags.shake = 0.7;
    flags.flash = 0.5;
  }
  if (line.fx === 'vision') {
    flags.vision = 1.6;
    if (cast.delphi) burstSparkles(cast.delphi.x, cast.delphi.y - 80, 14, '#ffe37a');
  }
  if (line.fx === 'sparkle') {
    burstSparkles(W / 2, H / 2 - 40, 26, '#7dffb0');
    burstSparkles(W / 2 - 200, H / 2, 14, '#ffe37a');
    burstSparkles(W / 2 + 200, H / 2, 14, '#f48fb1');
  }
  if (line.fx === 'seaglow') flags.seaglow = 2.5;

  speakerEl.textContent = line.s || '';
  speakerEl.style.color = SPEAKER_COLORS[line.s] || '#f4d35e';
  speakerEl.style.display = line.s ? 'block' : 'none';
  textEl.style.fontStyle = line.s ? 'normal' : 'italic';
  textEl.style.color = line.s ? '#f2ecdd' : '#cfc4a8';
  fullText = line.t;
  typeProgress = 0;
  typing = true;
  dlg.style.display = 'block';
  hintEl.style.visibility = 'hidden';
  speak(line);
}

function advance() {
  if (finished || fadeDir !== 0 && fade > 0.05) return;
  if (typing) {
    typeProgress = fullText.length;
    typing = false;
    textEl.textContent = fullText;
    hintEl.style.visibility = 'visible';
  } else {
    nextLine();
  }
}

let speechUnlocked = false;
stage.addEventListener('pointerdown', e => {
  if (e.target === replayBtn || e.target === voiceBtn) return;
  // iPhones only allow speech after a real tap - unlock with a silent one
  if (!speechUnlocked && window.speechSynthesis) {
    try { speechSynthesis.speak(new SpeechSynthesisUtterance('')); } catch (err) {}
    speechUnlocked = true;
  }
  advance();
});
const voiceBtn = document.getElementById('voiceBtn');
voiceBtn.addEventListener('pointerdown', e => e.stopPropagation());
voiceBtn.addEventListener('click', e => {
  e.stopPropagation();
  voiceOn = !voiceOn;
  voiceBtn.textContent = voiceOn ? 'VOICE ON' : 'VOICE OFF';
  if (!voiceOn && window.speechSynthesis) speechSynthesis.cancel();
});
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
    e.preventDefault();
    advance();
  }
});
replayBtn.addEventListener('click', () => {
  if (window.speechSynthesis) speechSynthesis.cancel();
  finished = false;
  replayBtn.style.display = 'none';
  fade = 1; fadeDir = -1;
  startScene(0);
});

// ---------- drawing extras ----------
function drawNote() {
  ctx.save();
  ctx.translate(480, 240);
  ctx.rotate(-0.03);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  rr(-165, -125, 340, 260, 8); ctx.fill();
  ctx.fillStyle = '#f6ecd4';
  rr(-170, -130, 340, 260, 8); ctx.fill();
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2;
  rr(-158, -118, 316, 236, 6); ctx.stroke();
  ctx.fillStyle = '#6d5a2e';
  ctx.textAlign = 'center';
  ctx.font = 'italic 22px Georgia';
  const linesTxt = [
    'Find me in a palm tree',
    'Help me get to victory',
    'On an island you will find',
    'Me with my own kind',
    '',
    '- MeMe'
  ];
  linesTxt.forEach((l, i) => ctx.fillText(l, 0, -70 + i * 34));
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawFloatBag(t) {
  // glowing satchel drifting out to sea
  const p = Math.min(1, (flags.floatT || 0) / 6);
  const x = 430 + p * 560;
  const y = 400 - p * 60 + Math.sin(t * 2) * 4;
  const s = 1 - p * 0.55;
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.shadowColor = '#7de3ff'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#8d6e4c';
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, 7); ctx.fill();
  ctx.fillStyle = '#6d5238';
  ctx.beginPath(); ctx.ellipse(0, -13, 9, 4, 0, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawTitleCard(scene, t) {
  ctx.fillStyle = '#f4d35e';
  ctx.textAlign = 'center';
  ctx.font = 'bold 72px Georgia';
  ctx.shadowColor = '#c9a227'; ctx.shadowBlur = 24;
  ctx.fillText(scene.title, W / 2, 220);
  ctx.shadowBlur = 0;
  if (scene.subtitle) {
    ctx.font = 'italic 24px Georgia';
    ctx.fillStyle = '#cfc4a8';
    ctx.fillText(scene.subtitle, W / 2, 264);
  }
  // broken chain emblem
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 5;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.ellipse(W / 2 - 110 + i * 44, 320, 20, 13, 0.5, 0, 7); ctx.stroke();
  }
  const gap = 6 + Math.sin(t * 2) * 2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.ellipse(W / 2 + 40 + gap + i * 44, 320, 20, 13, -0.5, 0, 7); ctx.stroke();
  }
  ctx.textAlign = 'left';
}

// ---------- main loop ----------
let last = performance.now();
function loop(now) {
  const dt = Math.max(0, Math.min(0.05, (now - last) / 1000));
  last = now;
  sceneT += dt;

  // fade transitions
  if (fadeDir === 1) {
    fade += dt * 2.2;
    if (fade >= 1) { fade = 1; fadeDir = -1; startScene(pendingScene); }
  } else if (fadeDir === -1) {
    fade -= dt * 1.6;
    if (fade <= 0) { fade = 0; fadeDir = 0; }
  }

  // typewriter (time-based)
  if (typing) {
    typeProgress += dt * 42;
    if (typeProgress >= fullText.length) {
      typeProgress = fullText.length;
      typing = false;
      hintEl.style.visibility = 'visible';
    }
    textEl.textContent = fullText.slice(0, Math.floor(typeProgress));
  }

  // effect timers
  if (flags.shake > 0) flags.shake -= dt;
  if (flags.flash > 0) flags.flash -= dt;
  if (flags.vision > 0) flags.vision -= dt;
  if (flags.seaglow > 0) flags.seaglow -= dt;
  if (flags.headFloat) flags.floatT = (flags.floatT || 0) + dt;

  const scene = SCENES[sceneIdx];

  // walk actors toward their move targets
  for (const k in cast) {
    const a = cast[k];
    if (a.tx != null) {
      const d = a.tx - a.x;
      const step = 150 * dt;
      if (Math.abs(d) <= step) { a.x = a.tx; a.tx = null; a.walking = false; }
      else { a.x += Math.sign(d) * step; a.walking = true; a.flip = d < 0; }
    } else a.walking = false;
  }
  // whose mouth is moving right now
  const curLine = (lineIdx >= 0 && lineIdx < scene.lines.length) ? scene.lines[lineIdx] : null;
  const mouthOpen = typing || (voiceOn && window.speechSynthesis && speechSynthesis.speaking);
  const mouthKeys = (curLine && curLine.s && mouthOpen) ? (MOUTH_OF[curLine.s] || []) : [];

  ctx.save();
  if (flags.shake > 0) {
    ctx.translate(rand(-1, 1) * flags.shake * 14, rand(-1, 1) * flags.shake * 10);
  }

  BG[scene.bg](sceneT);

  // actors (sorted so bigger y draws later = in front)
  const order = Object.keys(cast).filter(k => !cast[k].hidden)
    .sort((a, b) => (cast[a].y || 0) - (cast[b].y || 0));
  for (const k of order) {
    const a = cast[k];
    ctx.save();
    ctx.translate(a.x, a.y);
    if (a.flip) ctx.scale(-1, 1);
    if (k === 'chariot') chariot(sceneT, flags.crashed);
    else if (k === 'medusadown') medusaDown(sceneT);
    else if (k === 'bed') momInBed(sceneT, mouthKeys.indexOf('bed') !== -1);
    else if (CHAR[k]) {
      const glow = (flags.vision > 0 && k === 'delphi');
      CHAR[k]({
        t: sceneT, flip: false, glowEyes: glow, sad: a.sad,
        wingFeet: a.wingFeet, sword: a.sword,
        walk: a.walking, talking: mouthKeys.indexOf(k) !== -1
      });
    }
    ctx.restore();
  }

  if (flags.headFloat) drawFloatBag(sceneT);
  drawSparkles(dt);
  if (flags.note) drawNote();
  if (scene.title) drawTitleCard(scene, sceneT);

  // vision vignette
  if (flags.vision > 0) {
    const a = Math.min(0.5, flags.vision * 0.4);
    const g = ctx.createRadialGradient(W / 2, H / 2, 160, W / 2, H / 2, 560);
    g.addColorStop(0, 'rgba(255,210,63,0)');
    g.addColorStop(1, `rgba(255,190,40,${a})`);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  if (flags.seaglow > 0) {
    const a = Math.min(0.3, flags.seaglow * 0.15);
    ctx.fillStyle = `rgba(90,200,255,${a})`;
    ctx.fillRect(0, 300, W, 240);
  }
  if (flags.flash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, flags.flash * 2)})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();

  // letterbox bars
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 14);
  ctx.fillRect(0, H - 14, W, 14);

  // fade overlay
  if (fade > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(loop);
}

startScene(0);
requestAnimationFrame(loop);
})();
